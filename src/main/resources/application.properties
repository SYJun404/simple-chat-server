spring.application.name=chat

# 1. 数据库连接 URL
# simple_qq 是你之前创建的数据库名
spring.datasource.url=jdbc:mysql://localhost:3306/simple_chat?serverTimezone=GMT%2B8&useUnicode=true&characterEncoding=utf-8

# 2. 数据库用户名
spring.datasource.username=root

# 3. 数据库密码 (填你自己的)
spring.datasource.password=124212

# 4. 驱动程序
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 5. JPA/Hibernate 配置
# update 表示：如果数据库表不存在就自动创建，如果字段变了就更新表结构，但不会删数据
spring.jpa.hibernate.ddl-auto=update

# 在控制台显示生成的 SQL 语句（方便调试）
spring.jpa.show-sql=true

# 格式化输出的 SQL
spring.jpa.properties.hibernate.format_sql=true
